<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-container">
    <header class="header">
      <h1>待办事项</h1>
      <p class="subtitle">把今天的事情一件件做完</p>
    </header>

    <form class="input-area" autocomplete="off">
      <input
        type="text"
        id="todoInput"
        class="todo-input"
        placeholder="添加新任务..."
      >
      <button type="submit" id="addBtn" class="add-btn">添加</button>
    </form>

    <ul id="todoList" class="todo-list" aria-label="待办事项列表"></ul>

    <div id="emptyState" class="empty-state">
      <p>还没有任务，快来添加一个吧</p>
    </div>

    <footer class="footer">
      <span id="stats">0 项任务</span>
      <button id="clearDone" class="clear-btn" hidden>清空已完成</button>
    </footer>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
